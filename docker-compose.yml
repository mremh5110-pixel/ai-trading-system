version: "3.8"

services:
  engine:
    build: .
    command: ["python", "main.py", "--mode", "demo", "--loop", "--interval", "30"]
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  dashboard:
    build: .
    command: ["streamlit", "run", "dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - engine
    restart: unless-stopped

  webhook:
    build: .
    command: ["python", "webhook/tradingview_webhook.py"]
    ports:
      - "5005:5005"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    profiles: ["tradingview"]   # يعمل فقط لو فعّلته: docker compose --profile tradingview up
